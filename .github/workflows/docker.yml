name: Docker

# Builds CPU + GPU images and publishes them to GHCR. The GPU job
# (default variant) commits a self-hosted Docker status badge to
# docs/_static/docker.svg on main push.
#
# biodb has no private cross-repo deps, so the Docker build
# runs a plain ``pip install "."`` — no buildx secrets needed.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - 'docs/_static/docker.svg'
      - 'docs/_static/coverage.svg'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build + push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gpu
            dockerfile: Dockerfile.gpu
            tag_prefix: gpu
            is_default: true
          - variant: cpu
            dockerfile: Dockerfile.cpu
            tag_prefix: cpu
            is_default: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free up disk space
        run: |
          set -euxo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
                      /usr/local/.ghcup /opt/microsoft || true
          sudo docker image prune -af || true
          df -h /

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/biodb
          tags: |
            type=ref,event=branch,prefix=${{ matrix.tag_prefix }}-
            type=ref,event=tag,prefix=${{ matrix.tag_prefix }}-
            type=semver,pattern={{version}},prefix=${{ matrix.tag_prefix }}-
            type=semver,pattern={{major}}.{{minor}},prefix=${{ matrix.tag_prefix }}-
            type=sha,format=short,prefix=${{ matrix.tag_prefix }}-
            type=raw,value=${{ matrix.tag_prefix }}-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.is_default }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Write self-hosted Docker badge
        if: ${{ matrix.variant == 'gpu' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          mkdir -p docs/_static
          curl -sSf -o docs/_static/docker.svg \
            'https://img.shields.io/badge/docker-passing-2496ED?logo=docker&logoColor=white'

      - name: Commit Docker badge if changed
        if: ${{ matrix.variant == 'gpu' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          COMMIT_MSG: "chore(ci): update docker.svg"
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BADGE=docs/_static/docker.svg
          if git diff --quiet "$BADGE" 2>/dev/null && git ls-files --error-unmatch "$BADGE" >/dev/null 2>&1; then
            echo "$BADGE unchanged — skipping commit"
            exit 0
          fi
          git add "$BADGE"
          if git diff --cached --quiet; then
            echo "no diff to commit"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push
