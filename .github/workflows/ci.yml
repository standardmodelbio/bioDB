name: CI

# Lint + multi-version pytest + self-hosted coverage badge.
#
# biodb is a standalone package with no private cross-repo
# dependencies, so no PAT / CROSS_REPO_TOKEN plumbing is needed —
# the default GITHUB_TOKEN is enough.
#
# Security note: only github.* and matrix.* feed any step. No
# untrusted strings from issues / PRs reach any run: step.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/_static/coverage.svg'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[test]"
      - name: Run tests
        # Skip @pytest.mark.network tests in CI - they hit live remote APIs
        # (Maayan-Lab, UniProt, OBO Foundry, ...) and would be flaky.
        run: pytest -m "not network" --cov=biodb --cov-report=xml --cov-report=term

      - name: Generate coverage badge
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: coverage-badge -f -o docs/_static/coverage.svg

      - name: Commit coverage badge if changed
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          COMMIT_MSG: "chore(ci): update coverage.svg"
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BADGE=docs/_static/coverage.svg
          if git diff --quiet "$BADGE" 2>/dev/null && git ls-files --error-unmatch "$BADGE" >/dev/null 2>&1; then
            echo "$BADGE unchanged — skipping commit"
            exit 0
          fi
          git add "$BADGE"
          if git diff --cached --quiet; then
            echo "no diff to commit"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push
